# =============================================================
# CONFIGURAÇÃO DE REPLICAÇÃO PROD → DEV
# =============================================================
# Formato:
#   tabela | coluna_data | dias_retroativos | limit
#
# Todos os campos exceto "tabela" são opcionais:
#
#   tabela                            -> traz todos os registros, sem limit
#   tabela | | | 500                  -> traz os primeiros 500 registros
#   tabela | coluna_data | 90         -> filtra por data, sem limit
#   tabela | coluna_data | 90 | 500   -> filtra por data e limita a 500
#
# Linhas começando com # são ignoradas.
# =============================================================

# =============================================================
# WORKERS — número de tabelas processadas em paralelo
# Pode ser sobrescrito via --workers na linha de comando
# =============================================================
@workers | 5

# =============================================================
# MAPEAMENTO DE TABELAS HERDADAS
# Formato: @mapa | tabela_origem | tabela_destino | pk (opcional)
#
# Quando o script encontrar um insert para tabela_origem,
# redirecionará automaticamente para tabela_destino.
# Se a PK da tabela destino for diferente do padrão (id_destino_int),
# informe explicitamente no 4º campo.
# =============================================================
@mapa | cbcontrato | cbcontratonatura | id_cbcontrato_int

